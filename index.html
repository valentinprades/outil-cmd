<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>~/Outil_Bash</title>
    <!-- Chargement de la feuille de style Tailwind générée -->
    <link href="./dist/output.css" rel="stylesheet">
    <!-- Chargement de DOMPurify pour la sécurité XSS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <!-- Chargement de Canvas Confetti pour les animations du Quiz -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <!-- Favicon dynamique géré par le JS -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22%2334d399%22><path fill-rule=%22evenodd%22 d=%22M2.25 6A3.75 3.75 0 016 2.25h12A3.75 3.75 0 0121.75 6v12A3.75 3.75 0 0118 21.75H6A3.75 3.75 0 012.25 18V6zm5.836 2.456a.75.75 0 00-1.172 1.018l2.97 3.468-2.97 3.467a.75.75 0 101.172 1.018l3.407-3.978a.75.75 0 000-1.016L8.086 8.456zM12 16.5a.75.75 0 01.75-.75h4.5a.75.75 0 010 1.5h-4.5a.75.75 0 01-.75-.75z%22 clip-rule=%22evenodd%22/></svg>">
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-200 transition-colors duration-200 font-sans selection:bg-emerald-200 dark:selection:bg-emerald-900 flex flex-col min-h-screen">

    <!-- Barre de Navigation Commune -->
    <nav class="sticky top-0 z-50 bg-white/80 dark:bg-slate-950/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20 items-center">
                <div class="flex-shrink-0 cursor-pointer flex items-center gap-4" onclick="navigate('home')">
                    <span id="nav-logo" class="text-xl font-bold text-emerald-400 font-mono transition-colors hover:text-emerald-300">~/Outil_Bash</span>
                </div>
                <div class="flex items-center gap-2 sm:gap-3">
                    <!-- Bouton Dashboard -->
                    <button id="nav-btn-home" onclick="navigate('home')" class="bg-white dark:bg-slate-900/50 border border-slate-300 dark:border-slate-800 text-slate-700 dark:text-slate-300 hover:text-slate-900 dark:hover:text-white hover:bg-slate-50 dark:hover:bg-slate-800 rounded-lg p-2 transition-all shadow-sm flex items-center justify-center" title="Tableau de bord">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                    </button>
                    <!-- Boutons de switch d'univers -->
                    <button id="nav-btn-bash" onclick="switchUniverse('bash')" class="bg-white dark:bg-slate-900/50 border border-emerald-500/50 hover:bg-slate-50 dark:hover:bg-slate-800 text-emerald-600 dark:text-emerald-400 rounded-lg px-3 py-2 sm:px-4 sm:py-2 transition-all font-bold text-sm shadow-sm">Bash</button>
                    <button id="nav-btn-ps" onclick="switchUniverse('powershell')" class="bg-white dark:bg-slate-900/50 border border-slate-300 dark:border-slate-800 text-slate-700 dark:text-slate-300 hover:text-cyan-600 dark:hover:text-cyan-400 hover:border-cyan-500/50 hover:bg-slate-50 dark:hover:bg-slate-800 rounded-lg px-3 py-2 sm:px-4 sm:py-2 transition-all font-bold text-sm shadow-sm">PowerShell</button>

                    <!-- Séparateur visuel -->
                    <div class="hidden sm:block w-px h-6 bg-slate-300 dark:bg-slate-700 mx-1"></div>

                    <!-- Lien Favoris (Icône uniquement) -->
                    <button onclick="navigate('favorites')" class="group bg-white dark:bg-slate-900/50 border border-slate-300 dark:border-slate-800 text-slate-700 dark:text-slate-300 hover:text-amber-500 dark:hover:text-amber-400 hover:bg-slate-50 dark:hover:bg-slate-800 rounded-lg p-2 transition-all shadow-sm flex items-center justify-center" title="Vos Favoris">
                        <svg class="w-5 h-5 transition-colors group-hover:fill-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M11.48 3.499a.562.562 0 0 1 1.04 0l2.125 5.111a.563.563 0 0 0 .475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 0 0-.182.557l1.285 5.385a.562.562 0 0 1-.84.61l-4.725-2.885a.562.562 0 0 0-.586 0L6.982 20.54a.562.562 0 0 1-.84-.61l1.285-5.386a.562.562 0 0 0-.182-.557l-4.204-3.602a.562.562 0 0 1 .321-.988l5.518-.442a.563.563 0 0 0 .475-.345L11.48 3.5Z"></path></svg>
                    </button>

                    <!-- Bouton Theme Toggle -->
                    <button id="theme-toggle" class="p-2 text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors border border-transparent hover:border-slate-300 dark:hover:border-slate-700" title="Changer le thème">
                        <svg id="theme-toggle-dark-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
                        <svg id="theme-toggle-light-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" fill-rule="evenodd" clip-rule="evenodd"></path></svg>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-12 flex-grow">
        <div id="app">
            <!-- Le moteur JS injecte l'interface ici -->
        </div>
    </main>

    <!-- Footer -->
    <footer class="border-t border-slate-200 dark:border-slate-800 bg-white/50 dark:bg-slate-950/50 backdrop-blur-md mt-auto">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
            <p class="text-sm text-slate-500 dark:text-slate-400 leading-relaxed text-center">
                Créé par Valentin Prades - Version 0.5. Distribué sous<br>
                licence <a href="https://creativecommons.org/licenses/by-nc-sa/4.0/" target="_blank" rel="noopener noreferrer" class="hover:text-emerald-500 dark:hover:text-emerald-400 transition-colors underline decoration-slate-300 dark:decoration-slate-700 underline-offset-2">Creative Commons Attribution - Pas d’Utilisation Commerciale - Partage dans les Mêmes Conditions 4.0 International</a>.
            </p>
        </div>
    </footer>

    <!-- Chargement de l'application -->
    <script src="./script.js"></script>
</body>
</html>
