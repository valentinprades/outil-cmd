<!DOCTYPE html>
<html lang="fr" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>~/Outil_Bash</title>
    <!-- Ajout de Tailwind CSS via CDN pour le style sans compilation -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class'
      }
    </script>
    <style>
      /* Personnalisation de la barre de défilement (Scrollbar) */
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track { background: transparent; }
      
      /* Mode Clair */
      ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
      
      /* Mode Sombre */
      .dark ::-webkit-scrollbar-thumb { background: #334155; }
      .dark ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
  </head>
  <body class="bg-slate-100 dark:bg-slate-950 text-slate-800 dark:text-slate-300 antialiased selection:bg-emerald-500/30 min-h-screen flex flex-col transition-colors duration-300">
    <!-- Navbar globale type SaaS -->
    <nav class="sticky top-0 z-50 bg-white/90 dark:bg-slate-950/80 backdrop-blur-md border-b border-slate-300 dark:border-slate-800 transition-colors duration-300">
      <div class="container mx-auto px-6 max-w-5xl h-20 flex items-center justify-between">
        <div class="flex items-center gap-3 cursor-pointer" onclick="navigate('home')">
          <h1 class="text-xl font-bold text-emerald-400 font-mono hover:text-emerald-300 transition-colors">~/Outil_Bash</h1>
          <span class="bg-emerald-900/30 text-emerald-400 text-[10px] px-2 py-0.5 rounded-full border border-emerald-800/50 hidden sm:inline-block">v0.1</span>
        </div>
        
        <div class="flex items-center gap-2 sm:gap-3">
          <button onclick="navigate('home')" class="bg-white dark:bg-slate-900/50 border border-slate-300 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800 hover:border-emerald-500/50 text-slate-700 dark:text-slate-300 hover:text-emerald-600 dark:hover:text-emerald-400 rounded-lg px-3 py-2 sm:px-4 sm:py-2 transition-all font-bold text-sm shadow-sm">Dashboard</button>
          <button onclick="navigate('powershell')" class="bg-white dark:bg-slate-900/50 border border-slate-300 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800 hover:border-blue-500/50 text-slate-700 dark:text-slate-300 hover:text-blue-600 dark:hover:text-blue-400 rounded-lg px-3 py-2 sm:px-4 sm:py-2 transition-all font-bold text-sm shadow-sm">PowerShell</button>
          <button onclick="navigate('cmd')" class="bg-white dark:bg-slate-900/50 border border-slate-300 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800 hover:border-slate-500/50 text-slate-700 dark:text-slate-300 hover:text-slate-900 dark:hover:text-slate-200 rounded-lg px-3 py-2 sm:px-4 sm:py-2 transition-all font-bold text-sm shadow-sm">Cmd</button>
          
          <div class="h-8 w-px bg-slate-300 dark:bg-slate-800 mx-1 hidden sm:block"></div>
          
          <button onclick="navigate('favorites')" class="bg-white dark:bg-slate-900/50 border border-slate-300 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800 hover:border-amber-500/50 text-slate-500 dark:text-slate-400 hover:text-amber-600 dark:hover:text-amber-400 rounded-lg p-2 transition-all shadow-sm" title="Mes Favoris">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"></path></svg>
          </button>
          
          <button id="theme-toggle" class="bg-white dark:bg-slate-900/50 border border-slate-300 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800 hover:border-emerald-500/50 text-slate-500 dark:text-slate-400 hover:text-emerald-600 dark:hover:text-emerald-400 rounded-lg p-2 transition-all shadow-sm" title="Thème Clair/Sombre">
              <svg id="theme-toggle-dark-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
              <svg id="theme-toggle-light-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"></path></svg>
          </button>
        </div>
      </div>
    </nav>

    <div class="container mx-auto p-6 md:p-8 max-w-5xl flex-grow mt-4">
      
      <main id="app">
        <!-- Le contenu généré par JavaScript ira ici -->
      </main>
    </div>

    <footer class="border-t border-slate-300 dark:border-slate-800/50 bg-white/50 dark:bg-slate-900/30 py-6 mt-12 transition-colors duration-300">
      <div class="container mx-auto text-center text-slate-500 text-sm font-mono">
        <p>Créé par Valentin Prades - Version 0.1. Distribué sous licence <a href="https://creativecommons.org/licenses/by-nc-sa/4.0/" target="_blank" class="hover:text-emerald-400 transition-colors underline decoration-slate-700 hover:decoration-emerald-400">Creative Commons Attribution - Pas d’Utilisation Commerciale - Partage dans les Mêmes Conditions 4.0 International</a>.</p>
      </div>
    </footer>

    <script src="./script.js"></script>
  </body>
</html>
